services:
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - glitchtip-db

  glitchtip:
    image: glitchtip/glitchtip:6 # Check https://glitchtip.com/blog/ for new major versions
    depends_on:
      - glitchtip-db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip-db:5432/glitchtip
      VALKEY_URL: ""
      SECRET_KEY: 8b092f41428ff7a8fd1376c4f3a7368879867139f29d58e34c2bcd4c95c00e21
      EMAIL_URL: consolemail:// # Example smtp://email:password@smtp_url:port https://glitchtip.com/documentation/install#configuration
      GLITCHTIP_DOMAIN: http://localhost:8000 # Change this to your domain
      DEFAULT_FROM_EMAIL: email@example.com # Change this to your email
      ENABLE_ADMIN: "False" # Set to True to enable Django Admin at /admin/
      ENABLE_OPENAPI: "False" # Set to True to enable OpenAPI spec at /api/docs
      GLITCHTIP_ENABLE_MCP: "False" # Set to True to enable MCP server
      GLITCHTIP_ENABLE_DUCKDB: "False" # Set to True to enable cold storage archival
      SERVER_ROLE: all_in_one
    restart: unless-stopped
    volumes:
      - uploads:/code/uploads

  glitchtip-db:
    image: postgres:18
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: "trust" # Consider removing this and setting a password
    restart: unless-stopped
    volumes:
      - pg-data:/var/lib/postgresql
    ports:
      - "5432:5432"

  nuxt:
    container_name: nuxtapp
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:3000"

  umami:
    image: ghcr.io/umami-software/umami:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      APP_SECRET: N09p80unIQBlVVApDkENHaLEgJfqnVuyNfuSC7IGv1g=
    depends_on:
      umami-db:
        condition: service_healthy
    init: true
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:3000/api/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  umami-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
  uploads:
  umami-db-data: